<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CDN OFICIAL DESCOPE -->
  <script src="https://cdn.descope.com/web-components/latest/index.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 360px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Acesso ao Sistema</h2>

    <descope-wc
      id="descope"
      project-id="P39xNb625S2MYNXEBC1I6wmA6qWL"
      flow-id="sign-up-or-in"
      theme="light">
    </descope-wc>

  </div>

  <script>
    const el = document.getElementById("descope");

    // Se já estiver logado, vai direto para dashboard
    if (localStorage.getItem("session")) {
      window.location.href = "dashboard.html";
    }

    el.addEventListener("success", (e) => {
      console.log("Login OK");

      localStorage.setItem("session", e.detail.sessionJwt);
      localStorage.setItem("user", JSON.stringify(e.detail.user));

      window.location.href = "dashboard.html";
    });

    el.addEventListener("error", (e) => {
      console.error("Erro login:", e.detail);
    });
  </script>

</body>
</html>
