<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard - Sistema de Monitoramento</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
}

header {
    background-color: #2c3e50;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    margin: 0;
}

.logout-btn {
    background-color: #e74c3c;
    border: none;
    padding: 8px 14px;
    color: white;
    border-radius: 4px;
    cursor: pointer;
}

.container {
    padding: 20px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 30px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
}

.card h3 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: #555;
}

.card p {
    font-size: 22px;
    margin: 0;
    font-weight: bold;
}

.chart-container {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
    margin-bottom: 30px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    text-align: left;
}

th {
    background-color: #34495e;
    color: white;
}

tr:nth-child(even) {
    background-color: #f2f2f2;
}

.status-ok {
    color: green;
    font-weight: bold;
}

.status-alerta {
    color: red;
    font-weight: bold;
}
</style>
</head>
<body>

<header>
    <h2>Dashboard</h2>
    <button class="logout-btn" onclick="logout()">Sair</button>
</header>

<div class="container">

    <h1>Sistema de Monitoramento</h1>

    <div class="cards">
        <div class="card">
            <h3>Servidores Ativos</h3>
            <p>12</p>
        </div>

        <div class="card">
            <h3>Alertas Hoje</h3>
            <p>3</p>
        </div>

        <div class="card">
            <h3>Usuários Online</h3>
            <p>27</p>
        </div>

        <div class="card">
            <h3>Uso de CPU Médio</h3>
            <p>64%</p>
        </div>
    </div>

    <div class="chart-container">
        <h3>Uso de CPU (Últimos 7 dias)</h3>
        <canvas id="cpuChart"></canvas>
    </div>

    <h3>Lista de Servidores</h3>

    <table>
        <tr>
            <th>Servidor</th>
            <th>Status</th>
            <th>CPU</th>
            <th>Memória</th>
        </tr>
        <tr>
            <td>Servidor 01</td>
            <td class="status-ok">Online</td>
            <td>55%</td>
            <td>70%</td>
        </tr>
        <tr>
            <td>Servidor 02</td>
            <td class="status-alerta">Alerta</td>
            <td>92%</td>
            <td>88%</td>
        </tr>
        <tr>
            <td>Servidor 03</td>
            <td class="status-ok">Online</td>
            <td>43%</td>
            <td>60%</td>
        </tr>
    </table>

</div>

<script>
function logout() {
    window.location.href = "index.html";
}

const ctx = document.getElementById('cpuChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'],
        datasets: [{
            label: 'CPU %',
            data: [45, 59, 60, 75, 80, 65, 70],
            borderWidth: 2,
            fill: false
        }]
    },
    options: {
        responsive: true
    }
});
</script>

</body>
</html>
